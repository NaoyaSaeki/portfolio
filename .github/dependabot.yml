version: 2
updates:
  # Keep the GitHub Actions used in workflows patched (this repo pins actions to
  # commit SHAs; Dependabot bumps the SHA + version comment when updates land).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "ci"
# NOTE: no `npm` ecosystem entry — this is a dependency-free static site with no
# package.json. Add the block below if a Node toolchain is introduced later:
#
#   - package-ecosystem: "npm"
#     directory: "/"
#     schedule:
#       interval: "weekly"
