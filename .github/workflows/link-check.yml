name: Link Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "41 7 * * 1"

# Least privilege: only read repository contents.
permissions:
  contents: read

jobs:
  links:
    name: lychee
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout@v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Check links in HTML
        # lycheeverse/lychee-action@v2.4.1
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8
        with:
          args: >-
            --no-progress
            --max-concurrency 4
            "index.html"
            "ja/index.html"
          # Do not fail the build on transient network/rate-limit errors;
          # broken links are surfaced in the job summary for review.
          fail: false
