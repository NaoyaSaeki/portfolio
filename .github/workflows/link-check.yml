name: Link Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "41 7 * * 1"

# Least privilege: only read repository contents.
permissions:
  contents: read

jobs:
  links:
    name: lychee
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout@v4.2.2
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Check links in HTML
        # lycheeverse/lychee-action@v2.4.1
        uses: lycheeverse/lychee-action@82202e5e9c2f4ef1a55a3d02563e1cb6041e5332
        with:
          args: >-
            --no-progress
            --max-concurrency 4
            "index.html"
            "ja/index.html"
          # Do not fail the build on transient network/rate-limit errors;
          # broken links are surfaced in the job summary for review.
          fail: false
